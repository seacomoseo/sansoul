# collections > page > index
index_permalinks: Enlaces Permanentes
index_permalinks_hint: Es la base de las URLs o enlaces de las páginas de este tipo <br> **Ejemplo →** "categorias" mostrará "https://ejemplo.com/categorias/[slug]/"
index_slug_hint: Es el final de la URL o enlace de esta la página de índice <br> **Ejemplo →** "categoria" mostrará "https://ejemplo.com/categoria/"
index_singular: Título Singular
# collections > page > common
page_index: Índice
page_slug: Slug
page_slug_hint: Es el final de la URL o enlace de ésta página <br> Debe ser único (no repetirse) entre todas las páginas, corto, descriptivo y sin palabras irrelevantes (de, por, para, el…) <br> **Ejemplo →** para el título "*Paseo por el Nuevo Barrio por la Mañana*" puede quedar el slug "*paseo-nuevo-barrio-manana*"
page_title: Título
page_title_hint: '**Ejemplo →** "Día de paseo por el nuevo barrio"'
page_img: Imagen Principal
page_body: Contenido
page_body_hint: Los enlaces cuyo texto esté envueltro entre corchetes se convertirán en botones (opcionalmente se pueden personalizar si en el title entre corchetes se añaden una o varias de estas palabras → "**main**", "**alt**", "**light**", "**dark**", "**turn**", "**such**", "**swap**" o "**dot**", separar con cualquier caracter si se añaden varias) <br> En el title entre corchetes también se pueden añadir estas palabras → "**nofollow**" (ofuscado), "**homefollow**" (ofuscado excepto en página de inicio), "**blank**" (se abre en ventana nueva) y "**ga4**" (registra evento clave en GA4) <br> Se pueden añadir iconos usando, envuelto entre caracteres "**::**", uno de los siguientes nombres válidos → [Material Symbols](https://fonts.google.com/icons)
page_toc: Índice
page_toc_hint: Tabla de contenidos generada automáticamente mediante los encabezados del contenido
page_sum: Resumen
page_sum_hint: Se utiliza para las miniaturas de las listas <br> Si no se indica, se toman aproximadamente 15 primeras palabras o 155 caracteres del contenido (si hay)
page_seo: SEO
page_seo_hint: Se utiliza para los resultados de búsqueda en Google
page_seo_title: Título SEO
page_seo_title_hint: Recomendado entre 40 y 65 caracteres (~60) <br> Caracteres llamativos permitidos por Google → 【】 ® © ▷ ᐅ ◁ ✆ ⊛ « » ‹ › ✔
page_seo_desc: Descripción SEO
page_seo_desc_hint: Recomendado entre 70 y 155 caracteres (~135) <br> Caracteres llamativos permitidos por Google → llll➤ ✅ ✓ ✔ ✚ ☝️ ⚡ ✆ ® © ❤ ⬤ ✚ ➥
page_seo_noindex: No Index
page_seo_noindex_hint: Evita que google indexe la página (recomendado marcar si todo el contenido está copiado de otra web)
