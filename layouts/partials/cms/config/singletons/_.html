{{ $i  := site.Data.utilities.collections.icons }}
{{ $vf := "content/values.{{locale}}.yml" }}

{{ return slice
  (dict
    "file"      $vf
    "extension" `yml`
    "name"      `values`
    "label"     .values
    "icon"      $i.values
    "editor"    (dict "preview" false)
    "fields"    `~values`
    "i18n"      true
  )
}}
